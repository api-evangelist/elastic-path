        results:
          description: Total number of results for the entire collection.
          type: object
          properties:
            total:
              description: Total number of results for the entire collection.
              type: integer
              format: int64
        page:
          type: object
          properties:
            limit:
              description: The maximum number of records for all pages.
              type: integer
              format: int64
            offset:
              description: The current offset by number of pages.
              type: integer
              format: int64
            current:
              description: The current number of pages.
              type: integer
              format: int64
            total:
              description: The total number of records for the entire collection.
              type: integer
              format: int64
    files-relationship:
      description: In Product Experience Manager, products can have associated rich media assets, such as product images or a file containing additional product details.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/file-reference'
      x-omitempty: true
    included-response:
      type: object
      description: Included is an array of resources that are included in the response.
      properties:
        main_images:
          description: The main images associated with a product.
          type: array
          items:
            $ref: '#/components/schemas/elastic-path-file'
        component_products:
          description: Returns a list of component products in a product bundle. If a bundle has no component products (in other words, is not a product bundle), an empty array is returned.
          type: array
          items:
            $ref: '#/components/schemas/product'
        files:
          description: The files associated with a product.
          type: array
          items:
            $ref: '#/components/schemas/elastic-path-file'
    bundle-configuration:
      type: object
      title: BundleConfiguration
      description: A bundle is a purchasable product, comprising of one or more products that you want to sell together. You can create multiple components within a bundle. Each component must have at least one or more options. Each option is a product and a quantity.
      properties:
        selected_options:
          type: object
          description: The product options included in a component. This can be the ID of another bundle.
          example:
            games:
