components:
  schemas:
    file-reference:
      description: In Product Experience Manager, products can have associated rich media assets, such as product images or a file containing additional product details.
      type: object
      properties:
        type:
          description: This represents the type of object being returned. Always `file`.
          type: string
          example: file
          enum:
          - file
        id:
          description: A unique identifier for a file.
          type: string
          format: uuid
        created_at:
          description: The date and time a file is created.
          type: string
          format: date-time
          example: '1970-01-01T00:00:00.000'
          x-go-name: CreatedAt
      x-go-name: FileRelationship
    hierarchy-meta:
      type: object
      title: HierarchyMeta
      description: A hierarchy's metadata.
      properties:
        language:
          description: Product Experience Manager supports localization of hierarchies. If your store supports multiple languages, you can localize hierarchy names and descriptions. This is [**three-letter language code**](https://www.iso.org/iso-639-language-code) that represents the name of the language you have used.
          type: string
          example: en-GB
        breadcrumbs:
          description: Hierarchy Breadcrumbs
          type: array
          items:
            type: object
            properties:
              id:
                description: The unique identifier of a hierarchy.
                type: string
                example: e871df93-c769-49a9-9394-a6fd555b8e8a
                x-omitempty: true
              name:
                description: The name of the hierarchy.
                type: string
                example: Formal dresswear
                x-omitempty: true
              slug:
                description: A slug for the hierarchy.
                type: string
                example: formal
                x-omitempty: true
            x-go-name: HierarchyBreadcrumb
          x-omitempty: true
        has_children:
          description: Indicates whether a node has child nodes. `true` if the node has at least one child, `false` if it has none.
          type: boolean
          example: true
          x-go-name: HasChildren
          x-omitempty: true
          nullable: true
      x-go-name: HierarchyMeta
      x-omitempty: true
    self-link:
      description: Links are used to allow you to move between requests.
      type: object
      properties:
        self:
          description: Single entities use a self parameter with a link to that specific resource.
          type: string
      required:
      - self
    custom-relationship:
      description: A product can have custom relationships added that link to other products. These can be used for Parent/Child relationships as well as products that you want to Cross Sell/Promote.
      type: object
      properties:
        data:
          $ref: '#/components/schemas/product-references'
        links:
