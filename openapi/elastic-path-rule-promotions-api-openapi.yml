    Condition:
      type: object
      description: "The condition that gates this action. When present, the action is applied only if the condition is satisfied.\n**Valid top-level strategies:**\n- `cart_total` — gates the action based on the cart total (or filtered item total).\n  Supported on `cart_discount` actions only.\n- `and` / `or` — logical combinators. Children must all be the same level (all\n  cart-level or all item-level). `and`/`or` is only valid at the top level.\n- Item-level strategies (`item_identifier`, `item_price`, `item_quantity`,\n  `item_category`, `item_attribute`, `item_custom_attribute`) — filter which\n  items the cart discount applies to.\n\n**Placement rules for `cart_total`:**\n- Valid at the top level or as a direct child of `and`/`or` (all-cart siblings). - Not valid inside item-level condition children."
      discriminator:
        propertyName: strategy
      oneOf:
      - $ref: '#/components/schemas/AndCondition'
      - $ref: '#/components/schemas/OrCondition'
      - $ref: '#/components/schemas/CartTotalCondition'
      - $ref: '#/components/schemas/ItemIdentifierCondition'
      - $ref: '#/components/schemas/ItemPriceCondition'
      - $ref: '#/components/schemas/ItemQuantityCondition'
      - $ref: '#/components/schemas/ItemCategoryCondition'
      - $ref: '#/components/schemas/ItemAttributeCondition'
      - $ref: '#/components/schemas/CartItemCustomAttributeCondition'
      - $ref: '#/components/schemas/ShippingTypeCondition'
      - $ref: '#/components/schemas/ItemsBundleCondition'
