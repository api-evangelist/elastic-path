  parameters:
    include_hierarchies:
      name: include_hierarchies
      in: query
      description: When true, includes hierarchy objects in the response alongside nodes
      required: false
      schema:
        type: boolean
        default: false
    page_offset:
      name: page[offset]
      in: query
      description: The number of records to offset the results by.
      schema:
        type: integer
        minimum: 0
        maximum: 10000
        format: int64
        example: 0
    node_id:
      name: nodeID
      in: path
      schema:
        type: string
        example: 00000000-0000-0000-0000-000000000000
      required: true
      description: A unique identifier for the node.
    hierarchy_id:
      name: hierarchyID
      in: path
      schema:
        type: string
        example: 00000000-0000-0000-0000-000000000000
      required: true
      description: A unique identifier for the hierarchy.
    filter_nodes:
      name: filter
      in: query
      description: 'Many Commerce API endpoints support filtering. The general syntax is described [**here**](/guides/Getting-Started/filtering).

        '
      style: form
      explode: true
      schema:
        type: string
      examples:
        eq:
          value: eq(name,some-name)
        like:
          value: like(name,*some-name*)
        in:
          value: in(id,some-id)
        lt:
          value: lt(id,100)
        le:
          value: le(created_at,2023-01-01)
        gt:
          value: gt(updated_at,2023-01-01)
        ge:
          value: ge(parent_id,500)
        eq-owner:
          value: eq(owner,store)
        eq-locale:
          value: eq(locales.fr-FR.name,Nom-du-produit)
        like-locale:
          value: like(locales.es-ES.description,*descripción*)
    page_limit:
      name: page[limit]
      in: query
      description: The number of records per page. The maximum limit is 100.
      schema:
        type: integer
        minimum: 0
        maximum: 10000
        format: int64
        example: 10
