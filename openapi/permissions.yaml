openapi: 3.1.0
info:
  title: Permissions Introduction
  description: |
    A user's permissions are determined by their assigned role, which defines their level of access to APIs and Commerce Manager. These permissions ensure that users can only perform actions and access data relevant to their responsibilities.

    With [Commerce Extensions](/docs/api/commerce-extensions/commerce-extensions-introduction), you can create Custom APIs to extend the functionality of Commerce. Using Custom API Role Policies, you can specify the permissions for each role, ensuring fine-grained control over who can interact with these Custom APIs.
  contact:
    name: Elastic Path
    url: https://www.elasticpath.com
    email: support@elasticpath.com
  version: 26.0610.7728570
  x-version-timestamp: 2026-06-10T00:02:14Z
  license:
    name: MIT
    url: assets/LICENSE
servers:
  - url: https://useast.api.elasticpath.com
    description: US East
  - url: https://euwest.api.elasticpath.com
    description: EU West
security:
  - bearerAuth: []
tags:
  - name: Standard User Roles
    description: |
      Standard User Roles represent the roles that can be assigned to users through Commerce Manager. These roles define the level of access a user has to Commerce Manager.
  - name: Standard Shopper Roles
    description: |
      Standard Shopper Roles represent the roles of customers.
  - name: Custom API Role Policies
    description: |
      A Custom API Role Policy defines the level of access a role has to a Custom API. By default, administrative roles like **Store Admin** or **Org Admin** have full access to all Custom APIs. To grant access to other roles, a policy must be created for that specific role and Custom API.

      Below are the permissions that can be assigned to a role:

      | Permission | Description                              |
      |------------|------------------------------------------|
      | **Create** | Create a Custom API Entry.               |
      | **List**   | Retrieve a list of Custom API Entries.   |
      | **Read**   | Get a Custom API Entry.                  |
      | **Update** | Update a Custom API Entry.               |
      | **Delete** | Delete a Custom API Entry.               |
paths:
  /v2/permissions/standard-user-roles:
    get:
      tags:
        - Standard User Roles
      summary: List Standard User Roles
      operationId: ListStandardUserRoles
      description: |
        Retrieves a list of Standard User Roles
      responses:
        '200':
          $ref: '#/components/responses/ListOfStandardUserRoles'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v2/permissions/standard-user-roles/{standard-user-role-id}:
    parameters:
      - $ref: '#/components/parameters/StandardUserRoleID'
    get:
      tags:
        - Standard User Roles
      summary: Get a Standard User Role
      operationId: GetAStandardUserRole
      description: Get a Standard User Role
      responses:
        '200':
          $ref: '#/components/responses/StandardUserRole'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v2/permissions/standard-shopper-roles:
    get:
      tags:
        - Standard Shopper Roles
      summary: List Standard Shopper Roles
      operationId: ListStandardShopperRoles
      description: |
        Retrieves a list of Standard Shopper Roles
      responses:
        '200':
          $ref: '#/components/responses/ListOfStandardShopperRoles'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v2/permissions/standard-shopper-roles/{standard-shopper-role-id}:
    parameters:
      - $ref: '#/components/parameters/StandardShopperRoleID'
    get:
      tags:
        - Standard Shopper Roles
      summary: Get a Standard Shopper Role
      operationId: GetAStandardShopperRole
      description: Get a Standard Shopper Role
      responses:
        '200':
          $ref: '#/components/responses/StandardShopperRole'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v2/permissions/custom-api-role-policies:
    post:
      tags:
        - Custom API Role Policies
      summary: Create A Custom API Role Policy
      operationId: CreateACustomAPIRolePolicy
      description: Create A Custom API Role Policy
      requestBody:
        $ref: '#/components/requestBodies/CreateCustomAPIRolePolicy'
      responses:
        '201':
          $ref: '#/components/responses/CustomAPIRolePolicy'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Custom API Role Policies
      summary: List Custom API Role Policies
      operationId: ListCustomAPIRolePolicies
      description: |
        Retrieves a list of Custom API Role Policies

        ## Filtering
        The following operators and attributes are available for [filtering](/guides/Getting-Started/filtering) Custom API Role Policies:

        | Attribute        | Operators                     | Example                                                  |
        |------------------|-------------------------------|----------------------------------------------------------|
        | `id`             | `lt`,`le`,`eq`,`gt`,`ge`,`in` | `eq(id,3fa85f64-5717-4562-b3fc-2c963f66afa6)`            |
        | `created_at`     | `lt`,`le`,`eq`,`gt`,`ge`      | `ge(created_at,2024-04-29T00:00:00.000Z)`                |
        | `updated_at`     | `lt`,`le`,`eq`,`gt`,`ge`      | `le(updated_at,2024-04-29T00:00:00.000Z)`                |
        | `custom_api_id`  | `eq`                          | `eq(custom_api_id,fded1d2a-8bb8-48b6-86a5-9eb05cc8626a)` |
        | `role_id`        | `eq`                          | `eq(role_id,it-developer)`                               |

        ## Sorting
        The following attributes are available for sorting. When specified, the results are sorted in ascending order based on the value of the field. To sort in descending order, prefix the attribute with `-`, for example, `-updated_at`. The default sort order is `created_at` in descending order.
        - `id`
        - `created_at`
        - `updated_at`
      parameters:
        - $ref: '#/components/parameters/PageOffset'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/CustomAPIRolePolicySort'
      responses:
        '200':
          $ref: '#/components/responses/ListOfCustomAPIRolePolicies'
        '400':
          $ref: '#/components/responses/BadFilterError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v2/permissions/custom-api-role-policies/{custom-api-role-policy-id}:
    parameters:
      - $ref: '#/components/parameters/CustomAPIRolePolicyId'
    get:
      tags:
        - Custom API Role Policies
      summary: Get a Custom API Role Policy
      operationId: GetACustomAPIRolePolicy
      description: Get A Custom API Role Policy
      responses:
        '200':
          $ref: '#/components/responses/CustomAPIRolePolicy'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Custom API Role Policies
      summary: Update a Custom API Role Policy
      operationId: UpdateACustomAPIRolePolicy
      description: Update A Custom API Role Policy
      requestBody:
        $ref: '#/components/requestBodies/UpdateCustomAPIRolePolicy'
      responses:
        '200':
          $ref: '#/components/responses/CustomAPIRolePolicy'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Custom API Role Policies
      summary: Delete a Custom API Role Policy
      operationId: DeleteACustomAPIRolePolicy
      description: Delete A Custom API Role Policy
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    LinkURI:
      type:
        - string
        - 'null'
      format: uri
    StandardUserRole:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the Standard User Role.
        type:
          type: string
          description: Specifies the type of the resource object, use `standard_user_role` for Standard User Roles.
          const: standard_user_role
        name:
          type: string
          description: Specifies the name of the Standard User Role.
        access_levels:
          type: object
          description: Specifies the access levels for each permission group.
          properties:
            accounts:
              type: string
              description: The access level for Accounts.
              enum:
                - none
                - view
                - manage
            application_keys:
              type: string
              description: The access level for Application Keys.
              enum:
                - none
                - view
                - manage
            authentication:
              type: string
              description: The access level for Authentication.
              enum:
                - none
                - view
                - manage
            catalog_releases:
              type: string
              description: The access level for Catalog Releases.
              enum:
                - none
                - view
                - manage
            catalogs:
              type: string
              description: The access level for Catalogs.
              enum:
                - none
                - view
                - manage
            composer:
              type: string
              description: The access level for Composer.
              enum:
                - none
                - manage
            currencies:
              type: string
              description: The access level for Currencies.
              enum:
                - none
                - view
                - manage
            custom_apis:
              type: string
              description: The access level for Custom APIs.
              enum:
                - none
                - view
                - manage
            flows:
              type: string
              description: The access level for Flows.
              enum:
                - none
                - view
                - manage
            legacy_catalogs:
              type: string
              description: The access level for Legacy Catalogs.
              enum:
                - none
                - view
                - manage
            metrics:
              type: string
              description: The access level for Metrics.
              enum:
                - none
                - view
            orders:
              type: string
              description: The access level for Orders.
              enum:
                - none
                - view
                - manage
            payment_gateways:
              type: string
              description: The access level for Payment Gateways.
              enum:
                - none
                - view
                - manage
            personal_data:
              type: string
              description: The access level for Personal Data.
              enum:
                - none
                - view
                - manage
            price_books:
              type: string
              description: The access level for Price Books.
              enum:
                - none
                - view
                - manage
            products:
              type: string
              description: The access level for Products.
              enum:
                - none
                - view
                - manage
            promotions:
              type: string
              description: The access level for Promotions.
              enum:
                - none
                - view
                - manage
            settings:
              type: string
              description: The access level for Settings.
              enum:
                - none
                - view
                - manage
            subscription_billing:
              type: string
              description: The access level for Subscription Billing.
              enum:
                - none
                - view
                - manage
            subscription_jobs:
              type: string
              description: The access level for Subscription Jobs.
              enum:
                - none
                - view
                - manage
            subscription_offerings:
              type: string
              description: The access level for Subscription Offerings.
              enum:
                - none
                - view
                - manage
            subscription_subscribers:
              type: string
              description: The access level for Subscription Subscribers.
              enum:
                - none
                - view
                - manage
            team:
              type: string
              description: The access level for Team.
              enum:
                - none
                - view
                - manage
            webhooks:
              type: string
              description: The access level for Webhooks.
              enum:
                - none
                - view
                - manage
        links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/LinkURI'
              description: Specifies the URI of the Standard User Role.
              example: /v2/permissions/standard-user-roles/it-developer
    Errors:
      required:
        - errors
      properties:
        errors:
          type: array
          items:
