tags:
  - name: Search
    description: |
      The Search API enables you to search for products in your published catalogs. Search provides powerful capabilities including full-text search, filtering, faceting, and sorting to help shoppers find products quickly and efficiently.

      ### How Search Works

      When you publish a catalog with search enabled, the catalog's products are automatically indexed for search. The search index contains product data optimized for fast querying, including product names, descriptions, SKUs, categories, prices, and any custom fields you've configured.

      There are two types of search operations:

      - **Search**: Execute a single search query against a catalog. Use the GET endpoint for simple searches with query parameters.
      - **Multi-search**: Execute multiple search queries in a single request. Use the POST endpoint to batch searches together for improved performance.

      ### Search Features

      - **Full-text search**: Search across product names, descriptions, SKUs, and custom fields with typo tolerance and relevance ranking
      - **Filtering**: Narrow results using conditions on product attributes, categories, prices, and custom fields
      - **Faceting**: Get aggregated counts for attribute values to build dynamic navigation and refinement options
      - **Sorting**: Order results by price, name, custom fields, or relevance score
      - **Highlighting**: Get highlighted snippets showing where search terms match in product fields
      - **Autocomplete**: Get search suggestions as shoppers type their queries

      ### Shopper Context

      Search results are personalized based on the shopper's context. The system automatically determines which catalog and prices to use based on:

      - **Channel**: The shopping experience (web, mobile, B2B portal)
      - **Account**: For B2B scenarios, the account and parent accounts
      - **Customer**: The logged-in customer's segment
      - **Tags**: Custom context tags for advanced segmentation

      This context is provided via request headers and is used to resolve the appropriate catalog rules and price books.

      ### Admin vs Shopper Endpoints

      - **Shopper endpoints** (`/pcm/catalog/search`, `/pcm/catalog/multi-search`): Use shopper context headers to automatically resolve the correct catalog and prices.
      - **Admin endpoints** (`/pcm/catalogs/{catalog_id}/releases/{release_id}/search`): Directly specify the catalog and release to search, useful for previewing releases or testing.
  - name: Indexable Fields
    description: |
      Indexable Fields allow you to extend and fine-tune the search schema. By default, the search index includes all the core product fields like name, description, SKU, slug etc. Indexable Fields let you:

      - **Add custom fields** to the index from product extension templates or custom (shopper and admin) attributes
      - **Configure core field behavior** such as stemming and tokenization on built-in fields like `name` and `description`
      - **Control tokenization** at the collection or per-field level using token separators and symbols to index

      ### When to Use Indexable Fields

      Use Indexable Fields when you want to:

      - **Search custom attributes**: Enable full-text search on custom product fields like brand, material, or specifications
      - **Filter by custom attributes**: Allow shoppers to filter products by custom fields like color, size, or rating
      - **Facet on custom attributes**: Display aggregated counts for custom field values in your navigation
      - **Sort by custom attributes**: Order search results by custom numeric fields like rating or popularity
      - **Enable stemming**: Match different word forms (e.g., "running" also matches "run", "runs") on both custom or core fields
      - **Customize tokenization**: Control how hyphenated, compound, or symbol-containing text is split and indexed

      ### How Indexable Fields Work

      1. **Create indexable fields**: Define custom fields to index and configure collection-level or per-field tokenization settings
      2. **Override core field behavior**: Use `core_field_overrides` to configure stemming, token separators, or symbols to index on built-in fields like `name` and `description`
      3. **Reindex catalogs**: After creating or modifying indexable fields, reindex your catalog releases to apply the changes
      4. **Use in searches**: Once reindexed, custom fields are available in search queries for filtering, faceting, and sorting

      ### Field Configuration

      Each entry in the custom fields (`fields` array) supports the following options:

      | Option             | Description                                                                                               |
      |--------------------|-----------------------------------------------------------------------------------------------------------|
      | `name`             | The field path — see **Field Types** below for supported formats                                          |
      | `facetable`        | When `true`, the field can be used for faceting to show aggregated value counts                           |
      | `sortable`         | When `true`, the field can be used for sorting results                                                    |
      | `locale`           | Language code for text tokenization, defaults to `en` for English                                         |
      | `stem`             | When `true`, enables word stemming using the Snowball stemmer — see **Stemming** below                    |
      | `token_separators` | Per-field characters to use as token separators, overriding the collection-level setting                  |
      | `symbols_to_index` | Per-field special characters to preserve as part of tokens, overriding the collection-level setting       |

      ### Field Types

      Two categories of fields can be indexed:

      #### Extension Fields

      Fields from your product extension templates, following the pattern `extensions.products(<template_slug>).<field_name>`:

      - `<template_slug>` is the slug of your product extension template
      - `<field_name>` is the name of the field within that template
      - The field must exist and be enabled in the flows service
      - Only enumerated string fields, numeric fields, and boolean fields can be faceted

      **Example**: For a product extension template with slug `Details` containing a field `brand`, the indexable field name would be `extensions.products(Details).brand`.

      #### Custom Attribute Fields

      Merchant-defined key/value attributes stored directly on products:

      - `shopper_attributes.<attribute_name>` — visible in shopper and admin catalog API responses and available for filtering, sorting, and faceting in both shopper and admin search
      - `admin_attributes.<attribute_name>` — available for filtering and sorting in both shopper and admin search; not returned in search response payloads
      - `<attribute_name>` must be no longer than **64 characters** and can only contain alphanumeric characters, underscores (`_`), and hyphens (`-`).
      - Attribute fields are always typed as `string`
      - Faceting and sorting can be enabled

      **Examples**: `shopper_attributes.fabric`, `admin_attributes.internal_grade`

      ### Core Field Overrides

      In addition to configuring custom fields, Indexable Fields can influence the behavior of built-in product fields such as `name`, `description`, and `sku`. Use the `core_field_overrides` to apply per-field settings.

      Each entry in `core_field_overrides` supports `stem`, `token_separators`, `symbols_to_index`, and `sortable`. This is useful when you want to enable stemming on the product description, apply custom tokenization to a specific core field, or enable sorting on fields like `name` and `sku`.

      **Example**: Enable stemming on `description` and treat hyphens as token separators only on `name`:

      ```json
      {
        "core_field_overrides": [
          { "name": "description", "stem": true },
          { "name": "name", "token_separators": ["-"], "sortable": true }
        ]
      }
      ```

      ### Stemming

      Stemming reduces words to their root form at both index and query time, so a search for "running" also matches products containing "run", "runs", or "runner". This improves search recall for descriptive text fields where shoppers may use different word forms than those found in product data.

      - Enable per field using `stem: true` on any entry in `fields` or `core_field_overrides`
      - Uses the [Snowball stemmer](https://snowballstem.org/)
      - Only valid for string-typed fields
      - Defaults to `false`

      ### Token Separators and Symbols to Index

      These settings control how text is split into tokens during indexing and searching.

      #### Token Separators

      `token_separators` specifies characters that split text into separate tokens, in addition to the default whitespace splitting. This is useful for hyphenated text, part numbers, or other compound formats.

      For example, with `token_separators: ["-"]`, the text `non-tech` is tokenized to `non` and `tech`, so searches for both `non-tech` and `non tech` will match.

      #### Symbols to Index

      `symbols_to_index` specifies special characters that should be preserved within tokens rather than stripped during indexing. Useful when products contain meaningful symbols like `+`, `#`, or `@`.

      #### Collection-Level vs Field-Level

      Both settings can be configured at two scopes:

      - **Collection-level**: Set `token_separators` or `symbols_to_index` at the top level of the indexable fields resource to apply the setting across all indexed fields.
      - **Field-level**: Set the same properties on an individual entry in `fields` or `core_field_overrides` to apply only to that field, overriding the collection-level setting.

      An empty array at the field level defers to the collection-level setting.

      ### Reindexing Requirement

      Any change to indexable fields requires reindexing your catalog releases to take effect. The system detects when indexes are out of sync. Use the [reindex endpoint](/docs/api/pxm/catalog-search/reindex-tenant-releases) to apply changes. See [Jobs](/docs/api/pxm/catalog-search/jobs) for more details on reindexing operations.
  - name: Searchable Fields
    description: |
      The Searchable Fields API returns a list of all fields available for searching, filtering, faceting, and sorting in your search queries. This includes both the standard product fields that are indexed by default and any custom fields you've added through Indexable Fields.

      ### Using Searchable Fields

      Use this endpoint to:

      - **Discover available fields**: See all fields that can be used in search queries
      - **Build dynamic UIs**: Programmatically generate filter and facet options based on available fields
      - **Validate configurations**: Verify that your indexable fields have been properly added to the schema

      ### Field Properties

      Each searchable field includes:

      | Property | Description |
      | --- | --- |
      | `name` | The field name to use in search queries |
      | `type` | The data type (`string`, `int32`, `int64`, `float`, `bool`) |
      | `facetable` | Whether the field can be used for faceting |
      | `sortable` | Whether the field can be used for sorting |
      | `locale` | The language code for text fields |

      ### Standard vs Custom Fields

      - **Standard fields**: Built-in fields like `name`, `description`, `sku`, `meta.search.nodes.name` that are always available
      - **Custom fields**: Fields added through Indexable Fields from your product extensions
  - name: Search Profiles
    description: |
      Search Profiles are configuration objects that control how search queries are executed. They provide a powerful way to customize search relevance, filtering, and ranking without requiring code changes, enabling merchandisers and business users to optimize the search experience.

      ### How Search Profiles Work

      A Search Profile defines:

      - **Which fields to search**: Select which product fields are included in search queries
      - **Field weights**: Assign relative importance to each field for relevance ranking
      - **Default filters**: Apply business rules that filter results for all searches
      - **Boost rules**: Promote or demote products based on specific conditions
      - **Match type**: Control how scores from multiple fields are combined

      When a search request is made, the system uses the specified profile (or the default profile) to configure the search behavior.

      ### Search Profile Components

      | Component         | Description                                                                               |
      |-------------------|-------------------------------------------------------------------------------------------|
      | `slug`            | Unique identifier used to reference the profile in search requests                        |
      | `fields`          | List of fields to search with optional weights for relevance ranking                      |
      | `filters`         | Default filter expressions applied to all searches using this profile                     |
      | `boosts`          | Rules for promoting or demoting products based on conditions                              |
      | `text_match_type` | How to combine scores when multiple fields match (`max_score`, `max_weight`, `sum_score`) |

      ### Field Weights

      Field weights control how important each field is when ranking search results. Higher weights mean matches in that field contribute more to the relevance score. Weights must be in the range `[0, 15]`.

      **Example**: A profile with `name` (weight 10) and `description` (weight 5) will rank products with search term matches in the name higher than those with matches only in the description.

      ### Filters

      Profile filters enforce business rules that apply to all searches:

      - Ensure only live/published products appear in results
      - Restrict results to specific categories or channels
      - Hide products based on visibility settings

      Multiple filters are combined with OR logic, then ANDed with any filters in the search request.

      ### Boost Rules

      Boost rules allow you to promote or demote products in search results:

      - **Positive weights**: Push matching products to the top of results
      - **Negative weights**: Push matching products to the bottom (burying)
      - **Zero weight**: No effect on ranking

      Rules are evaluated in weight order, and the first matching rule determines the product's boost.

      ### Text Match Types

      | Type         | Description                                                                            |
      |--------------|----------------------------------------------------------------------------------------|
      | `max_score`  | Uses the highest score from any single matching field. Prioritizes match quality.      |
      | `max_weight` | Uses the score from the highest-weighted matching field. Prioritizes field importance. |
      | `sum_score`  | Sums weighted scores from all matching fields. Rewards multi-field matches.            |

      ### Default Profile

      Each store has a default search profile that is used when no profile is specified in the search request. You can set any profile as the default using the set default endpoint.

      ### Use Cases

      - **A/B testing**: Create multiple profiles with different configurations to test search relevance
      - **Channel optimization**: Different profiles for web, mobile, and B2B channels
      - **Seasonal merchandising**: Profiles that boost seasonal or promotional products
      - **Customer segmentation**: Different ranking strategies for different customer tiers
  - name: Search Indexes
    description: |
      Search Indexes represent the indexed data for your catalog releases. Each time a catalog is published with search enabled, a search index is created containing the product data optimized for fast querying.

      ### Index Status

      The Search Indexes API allows you to view the status of your indexes and identify any that are out of sync. An index becomes out of sync when:

      - Indexable fields have been added, modified, or deleted
      - The index failed to build during catalog publishing
      - A reindex is required due to schema changes

      ### Monitoring Indexes

      Use the list endpoint to:

      - **View all indexes**: See all search indexes for your store
      - **Check sync status**: Identify indexes that need reindexing
      - **Filter by status**: Find only out-of-sync indexes using the `out_of_sync` query parameter

      ### Index Information

      Each search index includes:

      | Property      | Description                                             |
      |---------------|---------------------------------------------------------|
      | `catalog_id`  | The ID of the catalog this index belongs to             |
      | `release_id`  | The ID of the catalog release this index was built from |
      | `out_of_sync` | Whether the index needs to be rebuilt                   |

      ### Reindexing

      When indexes are out of sync, use the reindex endpoint in [Jobs](/docs/api/pxm/catalog-search/jobs) to rebuild them. Reindexing ensures your search indexes reflect the current indexable field configuration.
  - name: Typesense Clusters
    description: Manage Typesense clusters (provision via jobs; get/list cluster state including status).
  - name: Jobs
    description: |
      Jobs manage the indexing operations for catalog search. When catalogs are published or when reindexing is required, jobs process the product data and build search indexes.

      ### Job Types

      | Type                      | Description                                                                                         |
      |---------------------------|-----------------------------------------------------------------------------------------------------|
      | `index-release`           | Index a specific catalog release. Created automatically when a search-enabled catalog is published. |
      | `delete-release`          | Remove the search index for a catalog release.                                                      |
      | `reindex-tenant-releases` | Reindex all catalog releases for the store. Use when indexable fields have changed.                 |

      ### Job Lifecycle

      Jobs progress through the following states:

      1. **pending**: Job has been created and is waiting to be processed
      2. **processing**: Job is actively indexing products
      3. **complete**: Job finished successfully
      4. **failed**: Job encountered an error

      ### Automatic Indexing

      When you publish a catalog with search enabled, an `index-release` job is automatically created. The catalog release remains in a publishing state until the indexing job completes successfully.

      ### Manual Reindexing

      Use the reindex endpoint when:

      - You've added, modified, or deleted indexable fields
      - Search indexes are out of sync (check via [Search Indexes](/docs/api/pxm/catalog-search/search-indexes))
      - You need to rebuild indexes after a failure

      The reindex operation creates jobs for all catalog releases that need updating. You can optionally force a full reindex of all releases regardless of their sync status.

      ### Conflict Handling

      Only one reindexing operation can run at a time. If you attempt to start a reindex while another is in progress, the API returns a 409 Conflict error.
  - name: Stopword Sets
    description: |
      Stopword Sets allow you to define sets of common words (such as "the", "a", "an", "is") that should be ignored during search queries. By removing these low-value terms from search processing, you can improve search relevance and reduce noise in results.

      ### How Stopword Sets Work

      A stopword set is a named container of stopword words. Each set belongs to an organization or store and is synced asynchronously. Once synced, the stopwords are applied during search query processing to filter out the specified terms.

      ### Common Stopwords

      Stopword sets contain a flat list of words to ignore:

      - **Common articles**: "the", "a", "an"
      - **Prepositions**: "in", "on", "at", "for"
      - **Conjunctions**: "and", "or", "but"

      ### Sync Status

      Stopword sets are synced asynchronously. The sync status is tracked and exposed in API responses:

      | Status           | Description                                                    |
      |------------------|----------------------------------------------------------------|
      | `pending_sync`   | Set has been created or updated in MongoDB but not yet synced  |
      | `synced`         | Set has been successfully synced                               |
      | `sync_failed`    | The last sync attempt failed                                   |
      | `pending_delete` | Set is marked for deletion; a background worker will remove it |

      ### Tenancy

      Stopword sets follow the same tenancy model as other resources:

      - **Organization-scoped sets**: Managed by the organization; apply across all stores
      - **Store-scoped sets**: Managed by the store; apply only to that store

      Stores cannot modify organization-scoped stopword sets.
  - name: Synonym Sets
    description: |
      Synonym Sets allow you to define groups of equivalent or related terms so that searches for one term also return results for its synonyms. This helps shoppers find products regardless of the specific terminology they use.

      ### How Synonym Sets Work

      A synonym set is a named container of synonym items. Each set belongs to an organization or store and is synced asynchronously. Once synced, a set can be attached to one or more search profiles; its synonym rules are then applied during searches that use those profiles to expand queries with matching terms.

      ### Synonym Types

      Each item within a synonym set can be either multi-way or one-way:

      - **Multi-way synonyms**: All terms are treated as equivalent. Searching for any term in the list returns results for all of them. For example, `["sneakers", "trainers", "running shoes"]` means a search for "trainers" also returns results for "sneakers" and "running shoes".
      - **One-way synonyms**: Searches for a `root` term also match the `synonyms`, but not vice versa. For example, with `root: "jacket"` and `synonyms: ["blazer", "coat"]`, searching for "jacket" also returns results for "blazer" and "coat", but searching for "blazer" does not return results for "jacket".

      ### Synonym Item Configuration

      Each item within a synonym set supports the following options:

      | Option             | Required | Description                                                                                                  |
      |--------------------|----------|--------------------------------------------------------------------------------------------------------------|
      | `id`               | Yes      | Unique identifier for the item within the set. Alphanumeric characters, hyphens, and underscores only.       |
      | `synonyms`         | Yes      | List of synonym terms. Minimum 1 if `root` is provided (one-way), minimum 2 if `root` is absent (multi-way). |
      | `root`             | No       | Makes this a one-way synonym. Must not also appear in the `synonyms` array.                                  |
      | `locale`           | No       | ISO 639 language code for this synonym item.                                                                 |
      | `symbols_to_index` | No       | Special characters to preserve as part of tokens. Each element must be exactly one character.                |

      ### Sync Status

      Synonym sets are synced asynchronously. The sync status is tracked and exposed in API responses:

      | Status           | Description                                                    |
      |------------------|----------------------------------------------------------------|
      | `pending_sync`   | Set has been created or updated in MongoDB but not yet synced  |
      | `synced`         | Set has been successfully synced                               |
      | `sync_failed`    | The last sync attempt failed                                   |
      | `pending_delete` | Set is marked for deletion; a background worker will remove it |

      ### Tenancy

      Synonym sets follow the same tenancy model as other resources:

      - **Organization-scoped sets**: Managed by the organization; apply across all stores
      - **Store-scoped sets**: Managed by the store; apply only to that store

      Stores cannot modify organization-scoped synonym sets.

      ### Using Synonym Sets in Search Profiles

      Synonym sets only take effect once they are attached to a [search profile](/docs/api/pxm/catalog-search/search-profiles) via its `synonym_sets` attribute. At search time, the synonym sets of the resolved search profile are applied to the query.

      When attaching a synonym set to a search profile:

      - The set must exist and be accessible by the calling tenant. Organization-level search profiles may only reference organization-level sets; store-level search profiles may reference organization-level and same-store sets.
      - The set must have been synced at least once. A set in `pending_sync` or `sync_failed` state can still be used if it was previously synced — its last synced state continues to apply.

      A synonym set cannot be deleted while it is referenced by any search profile; the delete request is rejected with a `409 Conflict` until the reference is removed.

      ### Use Cases

      - **Regional terminology**: Map British and American English terms (e.g., "trousers" ↔ "pants")
      - **Brand equivalents**: Link product category names with common alternatives
      - **Industry jargon**: Ensure technical terms match colloquial ones
      - **Abbreviations**: Map abbreviations to their full forms (e.g., "tee" → "t-shirt")
paths:
  /pcm/catalog/multi-search:
    post:
      tags:
        - Search
      operationId: postMultiSearch
      summary: Multi-search
      description: Execute one or more searches in a single request.
      parameters:
        - $ref: '#/components/parameters/accept-language'
        - $ref: '#/components/parameters/channel'
        - $ref: '#/components/parameters/products-include'
        - $ref: '#/components/parameters/tag'
        - $ref: '#/components/parameters/search-profile'
        - $ref: '#/components/parameters/simulated-shopper-date'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiSearchRequest'
      responses:
        '200':
          description: Multi-search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiSearchResponse'
        '400':
          description: Bad request - invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid-filter:
                  value:
                    errors:
                      - title: Invalid Filter
                        status: '400'
                        detail: Could not parse the filter query.
                invalid-facet:
                  value:
                    errors:
                      - title: Invalid Facet
                        status: '400'
                        detail: Invalid facet field specified.
                invalid-pagination:
                  value:
                    errors:
                      - title: Invalid Pagination
                        status: '400'
                        detail: Invalid page or per_page parameter.
        '500':
          $ref: '#/components/responses/InternalServerError'
  /pcm/catalogs/{catalog_id}/releases/{release_id}/multi-search:
    post:
      tags:
        - Search
      operationId: multiSearchByCatalogRelease
      summary: Admin Multi-search
      description: Execute one or more searches in a single request.
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the catalog to query
          x-go-name: catalogID
        - name: release_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of a published release of the catalog or `latestPublished` for the most recently published version
          x-go-name: releaseID
        - $ref: '#/components/parameters/accept-language'
        - $ref: '#/components/parameters/products-include'
        - $ref: '#/components/parameters/pricebook-ids-for-price-segmentation-preview'
        - $ref: '#/components/parameters/pricebook-ids-of-available-prices-to-show'
        - $ref: '#/components/parameters/search-profile'
        - $ref: '#/components/parameters/simulated-shopper-date'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiSearchRequest'
      responses:
        '200':
          description: Multi-search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiSearchResponse'
        '400':
          description: Bad request - invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid-filter:
                  value:
                    errors:
                      - title: Invalid Filter
                        status: '400'
                        detail: Could not parse the filter query.
                invalid-facet:
                  value:
                    errors:
                      - title: Invalid Facet
                        status: '400'
                        detail: Invalid facet field specified.
                invalid-pagination:
                  value:
                    errors:
                      - title: Invalid Pagination
                        status: '400'
                        detail: Invalid page or per_page parameter.
