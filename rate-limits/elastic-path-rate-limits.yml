name: Elastic Path API Rate Limits
description: Rate limiting rules enforced on the Elastic Path Commerce Cloud REST API for organizations and stores.
url: https://developer.elasticpath.com/guides/Getting-Started/rate-limits
created: 2026-06-13
modified: 2026-06-13

limits:
  - scope: Organization (default)
    requests_per_second: 100
    notes: Default rate limit for API calls made at the organization level.

  - scope: Production Store (default)
    requests_per_second: 100
    notes: Default rate limit for API calls made against a production store.

  - scope: Development Store (default)
    requests_per_second: 50
    notes: Lower default limit for development/sandbox stores.

counting:
  - Store requests and organization requests are counted separately.
  - Requests to a store do not consume the organization quota and vice versa.

error_response:
  http_status: 429
  message: Too Many Requests
  notes: Returned when the rate limit threshold is exceeded.

retry_guidance:
  - The JavaScript SDK automatically retries throttled requests.
  - For bulk/scripted imports, wait after receiving a 429 before retrying.
  - Job-based endpoints queue requests sequentially by creation timestamp instead of rejecting excess requests.

limit_increases:
  - Higher limits are available based on subscription tier.
  - Contact Elastic Path Support at least 4 weeks in advance to request a limit increase.
