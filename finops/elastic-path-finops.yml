name: Elastic Path FinOps
description: Financial operations guidance for managing and optimizing costs when using the Elastic Path Commerce Cloud platform.
url: https://www.elasticpath.com/pricing
created: 2026-06-13
modified: 2026-06-13

cost_drivers:
  - name: Annual Order Volume
    description: For order-based pricing plans, total orders per year determine the pricing tier. Exceeding tier thresholds triggers movement to the next tier.
    optimization: Monitor order volumes against tier thresholds and project growth to negotiate tier transitions early.

  - name: Gross Merchandise Value (GMV)
    description: For GMV-based plans, total annual GMV determines pricing tier. $50M+ GMV qualifies for Enterprise volume-based rates.
    optimization: Track GMV trends monthly to forecast tier changes. Negotiate multi-year contracts when growth trajectory is predictable.

  - name: Subscriptions and Entitlements Add-On
    description: Optional feature billed at 0.5% per transaction. Only applies if the subscriptions/entitlements capability is activated.
    optimization: Only enable the subscriptions feature if recurring-revenue use cases justify the per-transaction cost.

  - name: Implementation Services
    description: 40 expert services hours included in Year 1. Additional hours are billed separately.
    optimization: Use included hours for highest-value configuration tasks in Year 1. Plan self-service activities for subsequent years.

cost_avoidance:
  - No per-user or per-seat fees — scale teams without incremental licensing cost.
  - No payment processor surcharges — transaction fees go directly to the chosen payment provider.
  - 24/7 support included at all tiers — no need to purchase premium support add-ons.

contract_optimization:
  - Multi-year terms unlock better rates; evaluate commitment when growth projections are stable.
  - Negotiate tier boundaries upfront if order/GMV volumes are near a threshold.
  - Request rate limit increases 4+ weeks in advance to avoid emergency escalations that may carry fees.

performance_sla:
  - 99.999% uptime SLA included at all tiers.
  - Average API response time 30ms — budget for low-latency integration patterns.

monitoring:
  - Use status.elasticpath.com to track incidents that may affect billable transactions.
  - Monitor API rate limit headers to detect 429 responses that indicate wasted retry overhead.
