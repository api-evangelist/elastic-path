name: Elastic Path Plans and Pricing
description: Pricing plans for Elastic Path headless commerce platform, structured around order volume or GMV with annual commitments.
url: https://www.elasticpath.com/pricing
created: 2026-06-13
modified: 2026-06-13

models:
  - name: Order-Based Pricing
    description: Priced by annual order volume; suited for distributors, manufacturers, marketplaces, and B2B2C networks.
    tiers:
      - name: Entry
        price: 49500
        currency: USD
        period: year
        orders_per_year: 15000
        notes: Up to 15,000 orders annually.
      - name: Professional
        price: custom
        orders_per_year: 15001
        notes: Custom pricing for 15,000+ orders per year.
      - name: Enterprise
        price: volume_based
        orders_per_year: 150001
        notes: Volume-based rates for 150,000+ orders per year.

  - name: GMV-Based Pricing
    description: Priced by annual gross merchandise value; suited for D2C brands, multi-brand portfolios, and high-volume retail.
    tiers:
      - name: Entry
        price: 49500
        currency: USD
        period: year
        gmv_limit: 5000000
        notes: Up to $5M GMV annually.
      - name: Professional
        price: custom
        gmv_limit: 5000001
        notes: Custom pricing for $5M+ GMV per year.
      - name: Enterprise
        price: volume_based
        gmv_limit: 50000001
        notes: Volume-based rates for $50M+ GMV per year.

features_all_tiers:
  - Search
  - Visual Builder and CMS
  - Front End Hosting
  - Product Experience Manager
  - Promotions Builder
  - Composer (iPaaS with 30+ pre-built integrations)
  - Commerce Extensions
  - Account hierarchies
  - Quoting
  - Price books
  - Subscriptions
  - Rule-based catalogs
  - Dynamic bundles
  - 24/7 global support
  - 40 expert services hours in Year 1

add_ons:
  - name: Subscriptions and Entitlements
    fee: 0.5% per transaction
    notes: Optional; only charged if the feature is used.

terms:
  - Minimum annual commitment required
  - Multi-year terms unlock better rates
  - No per-user or per-seat fees
  - No payment processor surcharges
  - API average response time 30ms
  - 99.999% uptime SLA
