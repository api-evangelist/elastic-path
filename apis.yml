aid: elastic-path
name: Elastic Path
description: Elastic Path is a headless commerce platform providing REST and GraphQL
  APIs for managing catalogs, products, price books, promotions, carts, orders, subscriptions,
  payments, and customer accounts in composable commerce architectures. It is designed
  for B2B, D2C, and multi-brand enterprise retailers building API-first, microservices-based
  shopping experiences.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
