apis:
- aid: elastic-path:commerce-cloud-api
  name: Elastic Path Commerce Cloud API
  description: REST API for the full Elastic Path Commerce Cloud platform, covering
    accounts, addresses, application keys, catalogs, products, price books, promotions,
    carts, checkout, orders, payments, subscriptions, inventory, flows, integrations,
    files, currencies, and single sign-on.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.elasticpath.com/api
  baseURL: https://useast.api.elasticpath.com
  tags:
  - Commerce
  - REST
  - Catalogs
  - Products
  - Orders
  - Carts
  - Payments
  - Subscriptions
  - Promotions
  - Inventory
  properties:
  - type: Documentation
    url: https://developer.elasticpath.com/api
  - type: OpenAPI
    url: https://developer.elasticpath.com/elastic-path-commerce-apis.zip
- aid: elastic-path:graphql-api
  name: Elastic Path GraphQL API
  description: GraphQL abstraction over a subset of the Elastic Path Commerce Cloud
    APIs, providing a flexible query interface optimized for shopper-facing experiences
    including product browsing and catalog queries.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://www.elasticpath.com/technologies/graphql-ecommerce
  baseURL: https://useast.api.elasticpath.com
  tags:
